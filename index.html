<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Attendance Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .stats-bar { position: sticky; top: 0; background: white; padding: 15px; display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .student-card { padding: 20px; background: white; border: 1px solid #ccc; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; user-select: none; }
        .student-card.present { background: #28a745; color: white; border-color: #1e7e34; }
        .submit-btn { display: block; width: 100%; max-width: 300px; margin: 30px auto; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
        #loading { text-align: center; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div>Present: <span id="p-count">0</span></div>
    <div>Absent: <span id="a-count">0</span></div>
</div>

<div id="loading">Loading student list from Google Drive...</div>
<div class="grid" id="student-grid"></div>

<button class="submit-btn" id="submit-btn" onclick="submitAttendance()" style="display:none;">Submit Attendance</button>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6eLwUsAecZI3u9agG798A8JfoiKM-nFffeJGAz7Xmgv9D0RWDTfLx8hx3R38-WRv-Xg/exec"; 
    let attendance = {};

    async function loadStudents() {
        try {
            const response = await fetch(GAS_URL);
            const students = await response.json();
            renderGrid(students);
        } catch (e) {
            document.getElementById('loading').innerText = "Error loading students. Check GAS URL and permissions.";
        }
    }

    function renderGrid(students) {
        const grid = document.getElementById('student-grid');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';

        students.forEach(name => {
            attendance[name] = false;
            const card = document.createElement('div');
            card.className = 'student-card';
            card.innerText = name;
            card.onclick = () => {
                attendance[name] = !attendance[name];
                card.classList.toggle('present');
                updateUI(students.length);
            };
            grid.appendChild(card);
        });
        updateUI(students.length);
    }

    function updateUI(total) {
        const p = Object.values(attendance).filter(v => v).length;
        document.getElementById('p-count').innerText = p;
        document.getElementById('a-count').innerText = total - p;
    }

    async function submitAttendance() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        const payload = Object.keys(attendance).map(name => ({
            name: name,
            status: attendance[name] ? "Present" : "Absent"
        }));

        try {
            // Note: 'no-cors' is used because GAS redirects are tricky with standard fetch
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            alert("Attendance recorded!");
            location.reload();
        } catch (e) {
            alert("Success! (Note: Browser may show error due to CORS, but check your sheet)");
            location.reload();
        }
    }

    loadStudents();
</script>
</body>
</html>
